name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --ci --reporters=default

  # Lint + typecheck are intentionally separate jobs so we can stage them on
  # after the cleanup PR clears the current baseline (untyped Supabase calls
  # + 11 unrelated lint errors). Both already pass for individual changed
  # files; flipping them to required will happen in a follow-up PR.
